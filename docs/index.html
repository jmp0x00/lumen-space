<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Lumen Space is a realtime social visual game where visitors appear as lights in a shared cosmic room."
    >
    <meta http-equiv="refresh" content="0; url=./app/">
    <title>Lumen Space</title>
    <link rel="icon" href="./app/favicon.ico" sizes="any">
    <link rel="icon" href="./app/icon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="./app/apple-touch-icon.png">
    <meta name="theme-color" content="#05070d">
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #05070d;
        color: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #05070d;
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2.75rem;
        line-height: 1;
        letter-spacing: 0;
      }

      @media (max-width: 32rem) {
        h1 {
          font-size: 2.25rem;
        }
      }

      p {
        margin: 0 0 1.5rem;
        color: #cbd5e1;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        padding: 0 1rem;
        border: 1px solid rgba(248, 250, 252, 0.28);
        border-radius: 8px;
        color: #f8fafc;
        background: rgba(15, 23, 42, 0.62);
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid #facc15;
        outline-offset: 4px;
      }
    </style>
    <script>
      const target = new URL("./app/", window.location.href);
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target);
    </script>
  </head>
  <body>
    <main>
      <h1>Lumen Space</h1>
      <p>Launching the shared light room.</p>
      <a href="./app/">Enter Space</a>
    </main>
  </body>
</html>
