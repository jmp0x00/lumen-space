<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Lumen Space is a realtime social visual game where visitors appear as lights in a shared cosmic room."
    >
    <title>Lumen Space</title>
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="icon" href="./icon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <meta name="theme-color" content="#05070d">
    <link rel="stylesheet" href="./styles.css?v=room-ui-20260628">
  </head>
  <body>
    <main class="app-shell">
      <section class="lobby" id="lobby" aria-labelledby="app-title">
        <form class="lobby-panel" id="join-form">
          <div class="brand-row">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
              <h1 id="app-title">Lumen Space</h1>
              <p>Shared light room</p>
            </div>
          </div>

          <label for="name-input">Name</label>
          <div class="input-action-row">
            <input
              id="name-input"
              name="name"
              type="text"
              maxlength="18"
              autocomplete="nickname"
              placeholder="Ada"
              required
            >
            <button
              class="input-icon-button"
              id="generate-name-button"
              type="button"
              aria-label="Generate a new name"
              title="Generate a new name"
            >
              <span aria-hidden="true">&#8635;</span>
            </button>
          </div>

          <fieldset class="color-field">
            <legend>Color</legend>
            <div class="color-grid" id="color-grid"></div>
          </fieldset>

          <label for="room-input">Room</label>
          <div class="input-action-row">
            <input
              id="room-input"
              name="room"
              type="text"
              autocomplete="off"
              placeholder="lumen-room"
              required
            >
            <button
              class="input-icon-button"
              id="create-room-button"
              type="button"
              aria-label="Generate a new room"
              title="Generate a new room"
            >
              <span aria-hidden="true">&#8635;</span>
            </button>
          </div>

          <button class="primary-button" type="submit">Enter Space</button>
          <p class="lobby-note" id="lobby-note" role="status">
            Room links are ephemeral and peer-to-peer.
          </p>
        </form>
      </section>

      <section class="space" id="space" aria-label="Lumen Space room" hidden>
        <div class="scene-host" id="scene-host" aria-hidden="true"></div>

        <header class="top-bar">
          <div>
            <p class="eyebrow" id="room-label">Room</p>
            <h2 id="room-title">Lumen Space</h2>
          </div>
          <div class="status-pill" id="connection-status">Starting</div>
        </header>

        <aside class="people-panel" aria-label="Room participants">
          <div class="panel-title-row">
            <h3>Lights</h3>
            <span id="peer-count">1</span>
          </div>
          <ul id="people-list"></ul>
        </aside>

        <nav class="action-bar" aria-label="Room actions">
          <button
            class="icon-action-button"
            id="copy-link-button"
            type="button"
            aria-label="Copy invite link"
            title="Copy invite link"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M10 13a5 5 0 0 0 7.1 0l2.1-2.1a5 5 0 0 0-7.1-7.1l-1.2 1.2" />
              <path d="M14 11a5 5 0 0 0-7.1 0l-2.1 2.1a5 5 0 0 0 7.1 7.1l1.2-1.2" />
            </svg>
            <span class="action-label">Copy Link</span>
          </button>
          <button
            class="icon-action-button"
            id="sound-button"
            type="button"
            aria-pressed="true"
            aria-label="Mute lo-fi room music"
            title="Mute lo-fi room music"
          >
            <svg class="sound-icon sound-icon-on" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M11 5 6 9H3v6h3l5 4V5Z" />
              <path d="M15.5 8.5a5 5 0 0 1 0 7" />
              <path d="M18 6a8.5 8.5 0 0 1 0 12" />
            </svg>
            <svg class="sound-icon sound-icon-off" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M11 5 6 9H3v6h3l5 4V5Z" />
              <path d="m16 9 5 5" />
              <path d="m21 9-5 5" />
            </svg>
            <span class="action-label">Lo-Fi On</span>
          </button>
          <button
            class="icon-action-button icon-action-button-danger"
            id="leave-button"
            type="button"
            aria-label="Leave room"
            title="Leave room"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M10 17 15 12 10 7" />
              <path d="M15 12H3" />
              <path d="M21 19V5a2 2 0 0 0-2-2h-5" />
              <path d="M14 21h5a2 2 0 0 0 2-2" />
            </svg>
            <span class="action-label">Leave</span>
          </button>
        </nav>

        <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
      </section>
    </main>

    <script type="module" src="./src/app.js?v=room-ui-20260628"></script>
  </body>
</html>
