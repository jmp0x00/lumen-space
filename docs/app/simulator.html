<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Automated Lumen Space simulator for physics, realtime rooms, and procedural audio."
    >
    <title>Lumen Space Simulator</title>
    <link rel="stylesheet" href="./physics-sim.css?v=audible-reactions-20260628">
  </head>
  <body>
    <main class="sim-shell">
      <section class="sim-stage" aria-label="Lumen Space simulation">
        <canvas id="sim-canvas" width="1280" height="720"></canvas>
        <section
          class="realtime-stage"
          id="realtime-stage"
          aria-label="Realtime WebRTC room simulation"
          hidden
        >
          <div class="room-grid" id="room-grid"></div>
        </section>
      </section>

      <aside class="sim-panel" aria-label="Simulator controls and metrics">
        <header class="sim-header">
          <a class="back-link" href="./index.html" aria-label="Back to Lumen Space">←</a>
          <div>
            <h1>Simulator</h1>
            <p>Physics, realtime, and procedural audio</p>
          </div>
        </header>

        <div class="mode-grid" aria-label="Simulation mode">
          <button class="mode-button" type="button" data-mode="physics">
            Physics
          </button>
          <button class="mode-button" type="button" data-mode="realtime">
            Realtime
          </button>
          <button class="mode-button" type="button" data-mode="song">
            Song
          </button>
        </div>

        <div class="status-grid" aria-label="Simulation metrics">
          <div>
            <span id="metric-distance-label">Closest</span>
            <strong id="metric-distance">0.00</strong>
          </div>
          <div>
            <span id="metric-repulsion-label">Repulsion</span>
            <strong id="metric-repulsion">0.00</strong>
          </div>
          <div>
            <span id="metric-speed-label">Speed</span>
            <strong id="metric-speed">0.00</strong>
          </div>
        </div>

        <div class="control-row" aria-label="Simulation commands">
          <button id="pause-button" type="button" title="Pause or resume simulation">Ⅱ</button>
          <button id="reset-button" type="button" title="Reset current scenario">↺</button>
        </div>

        <div class="scenario-grid physics-controls" aria-label="Simulation scenarios">
          <button class="scenario-button" type="button" data-scenario="cluster">
            Cluster
          </button>
          <button class="scenario-button" type="button" data-scenario="orbit">
            Orbit
          </button>
          <button class="scenario-button" type="button" data-scenario="crossing">
            Crossing
          </button>
        </div>

        <label class="physics-controls" for="collision-input">
          Collision
          <output id="collision-output" for="collision-input">0.42</output>
        </label>
        <input
          class="physics-controls"
          id="collision-input"
          type="range"
          min="0"
          max="1.2"
          step="0.01"
          value="0.42"
        >

        <label class="physics-controls" for="strength-input">
          Strength
          <output id="strength-output" for="strength-input">24</output>
        </label>
        <input
          class="physics-controls"
          id="strength-input"
          type="range"
          min="0"
          max="42"
          step="1"
          value="24"
        >

        <label class="physics-controls" for="response-input">
          Separation
          <output id="response-output" for="response-input">0.18</output>
        </label>
        <input
          class="physics-controls"
          id="response-input"
          type="range"
          min="0"
          max="0.32"
          step="0.01"
          value="0.18"
        >

        <section class="realtime-controls" id="realtime-controls" hidden>
          <label for="realtime-room-input">
            Room
            <output id="realtime-room-output" for="realtime-room-input">lumen-webrtc-sim</output>
          </label>
          <input id="realtime-room-input" type="text" value="lumen-webrtc-sim">

          <label for="realtime-client-count-input">
            Clients
            <output id="realtime-client-count-output" for="realtime-client-count-input">6</output>
          </label>
          <input
            id="realtime-client-count-input"
            type="number"
            min="1"
            max="8"
            step="1"
            value="6"
          >

          <button
            class="sound-toggle-button"
            id="realtime-sound-button"
            type="button"
            aria-pressed="false"
          >
            Simulation Lo-Fi Off
          </button>

          <div
            class="realtime-preset-grid"
            id="realtime-preset-grid"
            aria-label="Realtime user presets"
          ></div>

          <button class="launch-button" id="launch-realtime-button" type="button">
            Launch Room
          </button>
        </section>

        <section class="song-controls" id="song-controls" hidden>
          <button
            class="sound-toggle-button"
            id="song-toggle-button"
            type="button"
            aria-pressed="false"
          >
            Space Lo-Fi Off
          </button>

          <button class="launch-button" id="song-seed-button" type="button">
            New Seed
          </button>

          <div class="song-signal" aria-label="Song seed">
            <span>Seed</span>
            <strong id="song-seed-output">lumen-space-song</strong>
          </div>

          <label for="song-bpm-input">
            Tempo
            <output id="song-bpm-output" for="song-bpm-input">72</output>
          </label>
          <input
            class="song-parameter"
            id="song-bpm-input"
            type="range"
            min="58"
            max="92"
            step="1"
            value="72"
          >

          <label for="song-density-input">
            Density
            <output id="song-density-output" for="song-density-input">0.50</output>
          </label>
          <input
            class="song-parameter"
            id="song-density-input"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
          >

          <label for="song-space-input">
            Space
            <output id="song-space-output" for="song-space-input">0.50</output>
          </label>
          <input
            class="song-parameter"
            id="song-space-input"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
          >

          <label for="song-volume-input">
            Volume
            <output id="song-volume-output" for="song-volume-input">0.84</output>
          </label>
          <input
            class="song-parameter"
            id="song-volume-input"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.84"
          >

          <div class="song-reaction-grid" aria-label="Song reactions">
            <button class="song-reaction-button" type="button" data-song-reaction="star-touch">
              Star Touch
            </button>
            <button class="song-reaction-button" type="button" data-song-reaction="resonance">
              Resonance
            </button>
          </div>
        </section>

        <section class="debug-list" aria-label="Peer state">
          <div class="debug-title" id="debug-title">Peers</div>
          <div id="peer-debug"></div>
        </section>
      </aside>
    </main>

    <script type="module" src="./src/physics-sim.js?v=audible-reactions-20260628"></script>
  </body>
</html>
