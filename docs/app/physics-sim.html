<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Automated Lumen Space physics simulator for inspecting peer repulsion."
    >
    <title>Lumen Space Physics Simulator</title>
    <link rel="stylesheet" href="./physics-sim.css">
  </head>
  <body>
    <main class="sim-shell">
      <section class="sim-stage" aria-label="Automated physics simulation">
        <canvas id="sim-canvas" width="1280" height="720"></canvas>
      </section>

      <aside class="sim-panel" aria-label="Physics simulation controls and metrics">
        <header class="sim-header">
          <a class="back-link" href="./index.html" aria-label="Back to Lumen Space">←</a>
          <div>
            <h1>Physics Simulator</h1>
            <p>Automated peer repulsion inspection</p>
          </div>
        </header>

        <div class="status-grid" aria-label="Simulation metrics">
          <div>
            <span>Closest</span>
            <strong id="metric-distance">0.00</strong>
          </div>
          <div>
            <span>Repulsion</span>
            <strong id="metric-repulsion">0.00</strong>
          </div>
          <div>
            <span>Speed</span>
            <strong id="metric-speed">0.00</strong>
          </div>
        </div>

        <div class="control-row" aria-label="Simulation commands">
          <button id="pause-button" type="button" title="Pause or resume simulation">Ⅱ</button>
          <button id="reset-button" type="button" title="Reset current scenario">↺</button>
        </div>

        <div class="scenario-grid" aria-label="Simulation scenarios">
          <button class="scenario-button" type="button" data-scenario="cluster">
            Cluster
          </button>
          <button class="scenario-button" type="button" data-scenario="orbit">
            Orbit
          </button>
          <button class="scenario-button" type="button" data-scenario="crossing">
            Crossing
          </button>
        </div>

        <label for="collision-input">
          Collision
          <output id="collision-output" for="collision-input">0.42</output>
        </label>
        <input id="collision-input" type="range" min="0" max="1.2" step="0.01" value="0.42">

        <label for="strength-input">
          Strength
          <output id="strength-output" for="strength-input">24</output>
        </label>
        <input id="strength-input" type="range" min="0" max="42" step="1" value="24">

        <label for="response-input">
          Separation
          <output id="response-output" for="response-input">0.18</output>
        </label>
        <input id="response-input" type="range" min="0" max="0.32" step="0.01" value="0.18">

        <section class="debug-list" aria-label="Peer state">
          <div class="debug-title">Peers</div>
          <div id="peer-debug"></div>
        </section>
      </aside>
    </main>

    <script type="module" src="./src/physics-sim.js?v=peer-collision-radius-20260627"></script>
  </body>
</html>
